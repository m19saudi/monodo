<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MonoDo Elite | v4.1</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        :root { 
            --red: #ff4d4d; --orange: #ffa502; --green: #2ed573; --grey: #64748b; --blue: #38bdf8;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f8fafc; --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: rgba(0,0,0,0.1);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; min-height: 100vh; overflow-x: hidden; }
        
        .app-header { position: sticky; top: 0; z-index: 1000; background: var(--bg); backdrop-filter: blur(15px); padding: 15px 0; border-bottom: 1px solid var(--border); }
        .todo-card { max-width: 550px; margin: auto; padding: 0 15px; }

        /* UNIFORM RELAXED DESIGN */
        .todo-item { 
            background: var(--card); border-radius: 20px; margin-bottom: 16px; 
            padding: 24px 20px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid var(--border); transition: 0.2s; 
            cursor: grab; min-height: 100px; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            position: relative; touch-action: none; /* Required for mobile drag */
        }
        .todo-item:active { cursor: grabbing; transform: scale(0.98); z-index: 10; opacity: 0.7; }
        
        /* Vivid Side Borders (Kept inside the border radius) */
        .p-3 { border-left: 10px solid var(--red); background: linear-gradient(90deg, rgba(255, 77, 77, 0.08) 0%, var(--card) 60%); }
        .p-2 { border-left: 10px solid var(--orange); background: linear-gradient(90deg, rgba(255, 165, 2, 0.08) 0%, var(--card) 60%); }
        .p-1 { border-left: 10px solid var(--green); background: linear-gradient(90deg, rgba(46, 213, 115, 0.08) 0%, var(--card) 60%); }
        .p-0 { border-left: 10px solid var(--grey); }

        /* LOCKED ACTION ZONE */
        .action-zone { display: flex; gap: 10px; align-items: center; flex-shrink: 0; margin-left: 15px; }
        .icon-btn { 
            font-size: 1.25rem; cursor: pointer; transition: 0.2s; opacity: 0.5; 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:active { opacity: 1; transform: scale(1.2); }
        .btn-edit:active { color: var(--blue); text-shadow: 0 0 15px var(--blue); }
        .btn-delete:active { color: var(--red); text-shadow: 0 0 15px var(--red); }

        .content-zone { flex-grow: 1; overflow: hidden; padding-left: 5px; }
        .task-text { font-size: 1.15rem; font-weight: 500; word-wrap: break-word; display: block; line-height: 1.4; }
        .edit-input { background: transparent; border: none; border-bottom: 2px solid var(--blue); color: var(--text); width: 100%; outline: none; font-size: 1.15rem; }

        /* CONTAINED COLOR SELECTOR */
        .p-selector { display: flex; gap: 12px; margin-top: 14px; padding: 2px; }
        .p-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .p-dot.active { border-color: white; transform: scale(1.25); box-shadow: 0 0 10px rgba(255,255,255,0.4); }

        /* TABS */
        .status-tabs { display: flex; background: rgba(0,0,0,0.2); border-radius: 14px; padding: 6px; gap: 6px; margin-bottom: 15px; }
        .status-tab { flex: 1; text-align: center; padding: 10px; font-size: 0.75rem; font-weight: 900; border-radius: 10px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .status-tab.active { background: var(--blue); color: white; opacity: 1; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

        .priority-dots { display: flex; justify-content: center; gap: 18px; margin-bottom: 10px; }
        .filter-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .filter-dot.active { border-color: white; transform: scale(1.2); }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-header shadow-sm">
            <div class="container todo-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold m-0"><i class="fa-solid fa-bolt-lightning text-info me-2"></i>MonoDo Elite</h4>
                    <div class="d-flex gap-4">
                        <i @click="toggleTheme" :class="theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon'" style="cursor:pointer; font-size: 1.4rem;"></i>
                        <i @click="deleteAll" class="fa-solid fa-trash-can text-danger" style="cursor:pointer; font-size: 1.4rem;"></i>
                    </div>
                </div>
                
                <div class="input-group mb-3">
                    <input type="text" v-model="newTask" ref="taskInput" @keyup.enter="addTask" class="form-control p-3 bg-transparent text-white" placeholder="What's the mission?">
                    <button @click="addTask" class="btn btn-info px-4 text-white fw-bold">ADD</button>
                </div>

                <div class="status-tabs">
                    <div v-for="s in ['all', 'pending', 'done']" :key="s" @click="statusFilter=s" class="status-tab text-uppercase" :class="{active: statusFilter===s}">{{s}}</div>
                </div>

                <div class="priority-dots">
                    <div @click="colorFilter='all'" class="filter-dot bg-info d-flex align-items-center justify-content-center text-white" style="font-size:0.6rem; font-weight:900" :class="{active: colorFilter==='all'}">ALL</div>
                    <div v-for="p in [3,2,1,0]" :key="p" @click="colorFilter=p" class="filter-dot" :style="{background: p==3?'var(--red)':p==2?'var(--orange)':p==1?'var(--green)':'var(--grey)'}" :class="{active: colorFilter===p}"></div>
                </div>
            </div>
        </div>

        <div class="container todo-card mt-4 pb-5">
            <div v-for="(todo, index) in filteredTodos" 
                 :key="todo.id" 
                 class="todo-item" 
                 :class="'p-' + (todo.priority || 0)"
                 draggable="true"
                 @dragstart="onDragStart($event, index)"
                 @dragover.prevent
                 @dragenter="onDragEnter(index)"
                 @dragend="onDragEnd">
                
                <input type="checkbox" class="form-check-input me-3" v-model="todo.completed" @change="updateTodo(todo)" style="width:28px; height:28px; flex-shrink:0;">
                
                <div class="content-zone">
                    <input v-if="todo.editing" v-model="todo.text" @blur="stopEdit(todo)" @keyup.enter="stopEdit(todo)" class="edit-input" autofocus>
                    <span v-else :class="{'text-decoration-line-through opacity-50': todo.completed}" class="task-text" @dblclick="todo.editing = true">
                        {{ todo.text }}
                    </span>
                    
                    <div class="p-selector">
                        <div v-for="p in [3,2,1,0]" :key="p" @click="setPriority(todo, p)" class="p-dot" :style="{background: p==3?'var(--red)':p==2?'var(--orange)':p==1?'var(--green)':'var(--grey)'}" :class="{active: todo.priority === p}"></div>
                    </div>
                </div>

                <div class="action-zone">
                    <div class="icon-btn btn-edit" @click="todo.editing = !todo.editing">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </div>
                    <div class="icon-btn btn-delete" @click="deleteTodo(todo.id)">
                        <i class="fa-solid fa-trash-can"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/todo';
        const { createApp } = Vue;

        createApp({
            data() {
                return { todos: [], newTask: '', theme: 'dark', colorFilter: 'all', statusFilter: 'all', dragSourceIndex: null };
            },
            computed: {
                filteredTodos() {
                    let list = [...this.todos].sort((a, b) => (a.order || 0) - (b.order || 0));
                    if (this.statusFilter === 'pending') list = list.filter(t => !t.completed);
                    if (this.statusFilter === 'done') list = list.filter(t => t.completed);
                    if (this.colorFilter !== 'all') list = list.filter(t => t.priority === this.colorFilter);
                    return list;
                }
            },
            methods: {
                async fetchTodos() {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    this.todos = data.map(t => ({...t, editing: false}));
                },
                async addTask() {
                    if (!this.newTask.trim()) return;
                    const val = this.newTask; this.newTask = '';
                    const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: val, order: this.todos.length}) });
                    this.todos.push({...await res.json(), editing: false});
                    this.$nextTick(() => this.$refs.taskInput.focus());
                },
                async updateTodo(todo) {
                    const { editing, ...cleanTodo } = todo;
                    await fetch(API_URL, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cleanTodo) });
                },
                async deleteTodo(id) {
                    await fetch(API_URL, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) });
                    this.todos = this.todos.filter(t => t.id !== id);
                },
                async deleteAll() {
                    if (confirm("Wipe workspace?")) {
                        await fetch(API_URL, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({all: true}) });
                        this.todos = [];
                    }
                },
                setPriority(todo, p) { todo.priority = p; this.updateTodo(todo); },
                stopEdit(todo) { todo.editing = false; this.updateTodo(todo); },
                toggleTheme() {
                    this.theme = this.theme === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', this.theme);
                },
                onDragStart(e, index) { this.dragSourceIndex = index; e.dataTransfer.effectAllowed = 'move'; },
                onDragEnter(index) {
                    if (this.dragSourceIndex === null || this.dragSourceIndex === index) return;
                    const items = [...this.todos].sort((a,b) => (a.order || 0) - (b.order || 0));
                    const movedItem = items.splice(this.dragSourceIndex, 1)[0];
                    items.splice(index, 0, movedItem);
                    items.forEach((item, i) => item.order = i);
                    this.todos = items;
                    this.dragSourceIndex = index;
                },
                onDragEnd() { this.dragSourceIndex = null; this.todos.forEach(t => this.updateTodo(t)); }
            },
            mounted() { this.fetchTodos(); document.documentElement.setAttribute('data-theme', 'dark'); }
        }).mount('#app');
    </script>
</body>
</html>
