<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do | Firebase + Vercel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .todo-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .done { text-decoration: line-through; color: #adb5bd; }
        .list-group-item { display: flex; justify-content: space-between; align-items: center; border: none; border-bottom: 1px solid #eee; }
        .btn-delete { color: #dc3545; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div class="todo-container">
            <h2 class="mb-4 text-center">My Tasks</h2>
            
            <div class="input-group mb-3">
                <input type="text" v-model="newTask" @keyup.enter="addTask" class="form-control" placeholder="What needs to be done?">
                <button @click="addTask" class="btn btn-primary">Add Task</button>
            </div>

            <ul class="list-group list-group-flush">
                <li v-for="todo in todos" :key="todo.id" class="list-group-item">
                    <div>
                        <input type="checkbox" class="form-check-input me-2" v-model="todo.completed" @change="toggleTodo(todo)">
                        <span :class="{ done: todo.completed }">{{ todo.text }}</span>
                    </div>
                    <button @click="deleteTodo(todo.id)" class="btn-delete">&times;</button>
                </li>
            </ul>
            
            <div v-if="loading" class="text-center mt-3">
                <div class="spinner-border spinner-border-sm text-primary"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://YOUR_VERCEL_API_URL/api/todo'; // Update this!

        const { createApp } = Vue;
        createApp({
            data() {
                return { todos: [], newTask: '', loading: false };
            },
            methods: {
                async fetchTodos() {
                    this.loading = true;
                    const res = await fetch(API_URL);
                    this.todos = await res.json();
                    this.loading = false;
                },
                async addTask() {
                    if (!this.newTask.trim()) return;
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: this.newTask })
                    });
                    const newItem = await res.json();
                    this.todos.push(newItem);
                    this.newTask = '';
                },
                async toggleTodo(todo) {
                    await fetch(API_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: todo.id, completed: todo.completed })
                    });
                },
                async deleteTodo(id) {
                    await fetch(API_URL, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id })
                    });
                    this.todos = this.todos.filter(t => t.id !== id);
                }
            },
            mounted() { this.fetchTodos(); }
        }).mount('#app');
    </script>
</body>
</html>
