<script>
    // AUTOMATIC URL DETECTION
    // This finds the current domain (e.g., monodo.vercel.app) 
    // and attaches the /api/todo path to it.
    const API_URL = `${window.location.origin}/api/todo`;

    const { createApp } = Vue;
    createApp({
        data() {
            return { todos: [], newTask: '', loading: false };
        },
        methods: {
            async fetchTodos() {
                this.loading = true;
                try {
                    const res = await fetch(API_URL);
                    if (!res.ok) throw new Error();
                    this.todos = await res.json();
                } catch (e) { console.error("Backend not reached at:", API_URL); }
                this.loading = false;
            },
            async addTask() {
                if (!this.newTask.trim()) return;
                this.loading = true;
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: this.newTask })
                    });
                    const newItem = await res.json();
                    this.todos.unshift(newItem);
                    this.newTask = '';
                } catch (e) { alert("Error adding task. Is the backend deployed?"); }
                this.loading = false;
            },
            async toggleTodo(todo) {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: todo.id, completed: todo.completed })
                });
            },
            async deleteTodo(id) {
                await fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                this.todos = this.todos.filter(t => t.id !== id);
            }
        },
        mounted() { this.fetchTodos(); }
    }).mount('#app');
</script>
