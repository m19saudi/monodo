<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MonoDo Elite | v3.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        :root { 
            --red: #ff4d4d; --orange: #ffa502; --green: #2ed573; --grey: #64748b; --blue: #38bdf8;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --text: #f8fafc; --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --card: rgba(255, 255, 255, 0.9); --text: #1e293b; --border: rgba(0,0,0,0.1);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; min-height: 100vh; }
        
        .app-header { position: sticky; top: 0; z-index: 1000; background: var(--bg); backdrop-filter: blur(15px); padding: 15px 0; border-bottom: 2px solid var(--blue); }
        .todo-card { max-width: 550px; margin: auto; padding: 0 15px; }

        /* VIVID PRIORITY CARDS */
        .todo-item { 
            background: var(--card); border-radius: 12px; margin-bottom: 12px; padding: 16px; 
            display: flex; align-items: center; border: 1px solid var(--border);
            transition: 0.3s; cursor: grab; position: relative; overflow: hidden;
        }
        .todo-item:active { cursor: grabbing; transform: scale(0.98); opacity: 0.8; }
        
        /* Full Card Glow Effects */
        .p-3 { border-left: 6px solid var(--red); background: linear-gradient(90deg, rgba(255, 77, 77, 0.1) 0%, var(--card) 100%); }
        .p-2 { border-left: 6px solid var(--orange); background: linear-gradient(90deg, rgba(255, 165, 2, 0.1) 0%, var(--card) 100%); }
        .p-1 { border-left: 6px solid var(--green); background: linear-gradient(90deg, rgba(46, 213, 115, 0.1) 0%, var(--card) 100%); }
        .p-0 { border-left: 6px solid var(--grey); }

        /* DRAG AND DROP VISUALS */
        .dragging { opacity: 0.4; border: 2px dashed var(--blue); }

        /* COLOR FILTERS */
        .color-filters { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .filter-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .filter-dot.active { border-color: var(--text); transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .priority-select { display: flex; gap: 8px; margin-top: 10px; }
        .p-btn { width: 15px; height: 15px; border-radius: 50%; cursor: pointer; border: 1px solid white; }
        
        .edit-input { background: transparent; border: none; border-bottom: 2px solid var(--blue); color: var(--text); width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-header shadow-sm">
            <div class="container todo-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold m-0"><i class="fa-solid fa-layer-group text-info me-2"></i>MonoDo Elite</h4>
                    <div class="d-flex align-items-center gap-3">
                        <i @click="toggleTheme" :class="theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon'" style="cursor:pointer"></i>
                        <i @click="deleteAll" class="fa-solid fa-trash-can text-danger" style="cursor:pointer"></i>
                    </div>
                </div>
                
                <div class="input-group mb-3">
                    <input type="text" v-model="newTask" @keyup.enter="addTask" class="form-control" placeholder="New task...">
                    <button @click="addTask" class="btn btn-info px-4 text-white fw-bold" :disabled="loading">
                        <span v-if="loading" class="spinner-border spinner-border-sm"></span>
                        <span v-else>ADD</span>
                    </button>
                </div>

                <div class="color-filters mb-3">
                    <div @click="colorFilter='all'" class="filter-dot bg-info text-white" :class="{active: colorFilter==='all'}">ALL</div>
                    <div @click="colorFilter=3" class="filter-dot" style="background: var(--red)" :class="{active: colorFilter===3}"></div>
                    <div @click="colorFilter=2" class="filter-dot" style="background: var(--orange)" :class="{active: colorFilter===2}"></div>
                    <div @click="colorFilter=1" class="filter-dot" style="background: var(--green)" :class="{active: colorFilter===1}"></div>
                    <div @click="colorFilter=0" class="filter-dot" style="background: var(--grey)" :class="{active: colorFilter===0}"></div>
                </div>
            </div>
        </div>

        <div class="container todo-card mt-4 pb-5">
            <div v-for="(todo, index) in filteredTodos" 
                 :key="todo.id" 
                 class="todo-item animate__animated animate__fadeInUp" 
                 :class="['p-' + (todo.priority || 0), { dragging: draggingIndex === index }]"
                 draggable="true"
                 @dragstart="onDragStart(index)"
                 @dragover.prevent
                 @dragenter="onDragEnter(index)"
                 @dragend="onDragEnd">
                
                <input type="checkbox" class="form-check-input me-3" v-model="todo.completed" @change="updateTodo(todo)">
                
                <div class="flex-grow-1">
                    <input v-if="todo.editing" v-model="todo.text" @blur="stopEdit(todo)" @keyup.enter="stopEdit(todo)" class="edit-input" autofocus>
                    <span v-else :class="{'text-decoration-line-through opacity-50': todo.completed}" class="fw-semibold" @dblclick="todo.editing = true">
                        {{ todo.text }}
                    </span>
                    
                    <div class="priority-select">
                        <div v-for="p in [3,2,1,0]" :key="p" @click="setPriority(todo, p)" class="p-btn" :style="{background: p==3?'var(--red)':p==2?'var(--orange)':p==1?'var(--green)':'var(--grey)'}"></div>
                    </div>
                </div>

                <div class="d-flex gap-3 ms-2">
                    <i @click="deleteTodo(todo.id)" class="fa-solid fa-xmark opacity-25 text-danger" style="cursor:pointer"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/todo';
        const { createApp } = Vue;

        createApp({
            data() {
                return { 
                    todos: [], newTask: '', loading: false, theme: 'dark', colorFilter: 'all',
                    draggingIndex: null 
                };
            },
            computed: {
                filteredTodos() {
                    let list = [...this.todos];
                    // Sort logic: Priority first (3 to 0), then use 'order' for the drag positions
                    list.sort((a, b) => (b.priority || 0) - (a.priority || 0) || (a.order || 0) - (b.order || 0));
                    
                    if (this.colorFilter !== 'all') {
                        return list.filter(t => t.priority === this.colorFilter);
                    }
                    return list;
                }
            },
            methods: {
                async fetchTodos() {
                    this.loading = true;
                    try {
                        const res = await fetch(API_URL);
                        this.todos = (await res.json()).map(t => ({...t, editing: false}));
                    } finally { this.loading = false; }
                },
                async addTask() {
                    if (!this.newTask.trim()) return;
                    this.loading = true;
                    try {
                        const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: this.newTask}) });
                        this.todos.push({...await res.json(), editing: false});
                        this.newTask = '';
                    } finally { this.loading = false; }
                },
                async updateTodo(todo) {
                    const { editing, ...cleanTodo } = todo;
                    await fetch(API_URL, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(cleanTodo) });
                },
                setPriority(todo, p) {
                    todo.priority = p;
                    this.updateTodo(todo);
                },
                stopEdit(todo) {
                    todo.editing = false;
                    this.updateTodo(todo);
                },
                async deleteTodo(id) {
                    await fetch(API_URL, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) });
                    this.todos = this.todos.filter(t => t.id !== id);
                },
                async deleteAll() {
                    if (confirm("Delete everything?")) {
                        await fetch(API_URL, { method: 'DELETE', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({all: true}) });
                        this.todos = [];
                    }
                },
                toggleTheme() {
                    this.theme = this.theme === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', this.theme);
                },
                // NATIVE DRAG & DROP LOGIC
                onDragStart(index) {
                    this.draggingIndex = index;
                },
                onDragEnter(index) {
                    if (index === this.draggingIndex) return;
                    const movedItem = this.todos.splice(this.draggingIndex, 1)[0];
                    this.todos.splice(index, 0, movedItem);
                    this.draggingIndex = index;
                },
                onDragEnd() {
                    this.draggingIndex = null;
                    // Save the new order to the database
                    this.todos.forEach((t, i) => {
                        t.order = i;
                        this.updateTodo(t);
                    });
                }
            },
            mounted() { 
                this.fetchTodos();
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }).mount('#app');
    </script>
</body>
</html>
